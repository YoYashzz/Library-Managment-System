<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Library Management System</title>
    <meta name="description" content="A premium library management application">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    
    <main class="app-container">
        <header class="app-header glass-card">
            <h1>LibFlow</h1>
            <p>Next-Gen Library Management System</p>
        </header>

        <div class="dashboard grid blur-in">
            <!-- Left Panel: Actions -->
            <section class="actions-panel glass-card">
                <div class="tabs">
                    <button class="tab-btn active" data-target="add-section">Add Book</button>
                    <button class="tab-btn" data-target="issue-section">Issue</button>
                    <button class="tab-btn" data-target="return-section">Return</button>
                </div>

                <div class="tab-content active" id="add-section">
                    <form id="add-form">
                        <div class="input-group">
                            <label for="add-id">Book ID</label>
                            <input type="text" id="add-id" required placeholder="e.g. B001">
                        </div>
                        <div class="input-group">
                            <label for="add-title">Title</label>
                            <input type="text" id="add-title" required placeholder="The Great Gatsby">
                        </div>
                        <div class="input-group">
                            <label for="add-author">Author</label>
                            <input type="text" id="add-author" required placeholder="F. Scott Fitzgerald">
                        </div>
                        <button type="submit" class="btn btn-primary">Add Book</button>
                    </form>
                </div>

                <div class="tab-content" id="issue-section">
                    <form id="issue-form">
                        <div class="input-group">
                            <label for="issue-id">Book ID</label>
                            <input type="text" id="issue-id" required placeholder="Book ID">
                        </div>
                        <div class="input-group">
                            <label for="issue-member">Member Name</label>
                            <input type="text" id="issue-member" required placeholder="John Doe">
                        </div>
                        <button type="submit" class="btn btn-warning">Issue Book</button>
                    </form>
                </div>

                <div class="tab-content" id="return-section">
                    <form id="return-form">
                        <div class="input-group">
                            <label for="return-id">Book ID</label>
                            <input type="text" id="return-id" required placeholder="Book ID">
                        </div>
                        <button type="submit" class="btn btn-success">Return Book</button>
                    </form>
                </div>
            </section>

            <!-- Right Panel: Inventory List -->
            <section class="inventory-panel glass-card">
                <div class="inventory-header">
                    <h2>Inventory</h2>
                    <div class="search-bar">
                        <input type="text" id="search-input" placeholder="Search titles...">
                    </div>
                </div>

                <div class="table-wrapper custom-scroll">
                    <table id="books-table">
                        <thead>
                            <tr>
                                <th>Book ID</th>
                                <th>Title</th>
                                <th>Author</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="books-body">
                            <!-- Dynamic row injection -->
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <!-- Toast Notifications -->
    <div id="toast" class="toast">
        <span id="toast-message">Notification</span>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
